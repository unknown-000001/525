<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字华容道 - 带排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f7fa;
            padding: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        /* 难度 */
        .difficulty {
            margin: 15px 0;
        }

        .diff-btn {
            padding: 10px 20px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .diff-btn.active {
            background: #2b7bff;
        }

        .diff-btn:hover {
            opacity: 0.9;
        }

        /* 信息 */
        .info {
            display: flex;
            gap: 30px;
            margin: 10px 0;
            font-size: 18px;
            color: #555;
        }

        /* 按钮 */
        .control {
            margin: 15px 0;
        }

        .ctrl-btn {
            padding: 10px 25px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        #shuffle { background: #67c23a; color: white; }
        #reset { background: #f56c6c; color: white; }
        #rankBtn { background: #9062f0; color: white; }

        .ctrl-btn:hover {
            opacity: 0.9;
        }

        /* 棋盘 */
        .puzzle-container {
            margin-top: 20px;
            border: 3px solid #333;
            border-radius: 8px;
            background: white;
            padding: 8px;
        }

        .puzzle {
            display: grid;
            gap: 4px;
            background: #ccc;
            padding: 4px;
            border-radius: 4px;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #409eff;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.15s ease;
            user-select: none;
            width: 80px;
            height: 80px;
        }

        .tile.empty {
            background: transparent;
            cursor: default;
        }

        .tile:hover:not(.empty) {
            background: #2b7bff;
        }

        /* 胜利 */
        .win {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #67c23a;
            display: none;
        }

        /* 排行榜 */
        .rank-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .rank-box {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .rank-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .rank-tab {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .rank-tab button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: #eee;
            cursor: pointer;
        }

        .rank-tab button.active {
            background: #409eff;
            color: white;
        }

        .rank-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }

        .rank-item.top1 {
            background: #fff6cc;
            font-weight: bold;
        }

        .rank-close {
            padding: 8px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 输入名字 */
        .name-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .name-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .name-box input {
            padding: 8px 12px;
            font-size: 16px;
            width: 200px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .name-box button {
            padding: 8px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">数字华容道</div>

    <div class="difficulty">
        <button class="diff-btn active" data-size="3">3×3 简单</button>
        <button class="diff-btn" data-size="4">4×4 中等</button>
        <button class="diff-btn" data-size="5">5×5 困难</button>
    </div>

    <div class="info">
        <div>步数：<span id="steps">0</span></div>
        <div>时间：<span id="time">0</span>s</div>
    </div>

    <div class="control">
        <button class="ctrl-btn" id="shuffle">开始游戏</button>
        <button class="ctrl-btn" id="reset">重置</button>
        <button class="ctrl-btn" id="rankBtn">排行榜</button>
    </div>

    <div class="puzzle-container">
        <div class="puzzle" id="puzzle"></div>
    </div>

    <div class="win" id="win">🎉 恭喜通关！</div>

    <!-- 排行榜弹窗 -->
    <div class="rank-modal" id="rankModal">
        <div class="rank-box">
            <div class="rank-title">🏆 排行榜</div>
            <div class="rank-tab">
                <button class="active" data-diff="3">3×3</button>
                <button data-diff="4">4×4</button>
                <button data-diff="5">5×5</button>
            </div>
            <div class="rank-list" id="rankList"></div>
            <button class="rank-close" id="closeRank">关闭</button>
        </div>
    </div>

    <!-- 输入名字 -->
    <div class="name-modal" id="nameModal">
        <div class="name-box">
            <div>恭喜通关！请输入你的名字：</div>
            <input type="text" id="userName" placeholder="输入名字" maxlength="8">
            <button id="saveName">确认上榜</button>
        </div>
    </div>

    <script>
        let size = 3;
        let tiles = [];
        let emptyIndex = size * size - 1;
        let steps = 0;
        let time = 0;
        let timer = null;
        let isPlaying = false;
        let target = [];

        const puzzleEl = document.getElementById('puzzle');
        const stepsEl = document.getElementById('steps');
        const timeEl = document.getElementById('time');
        const winEl = document.getElementById('win');
        const diffBtns = document.querySelectorAll('.diff-btn');

        // 初始化目标
        function initTarget() {
            target = [];
            for (let i=1; i<size*size; i++) target.push(i);
            target.push(0);
        }

        // 难度切换
        diffBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                diffBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                size = parseInt(btn.dataset.size);
                resetGame();
            });
        });

        // 初始化棋盘
        function initPuzzle() {
            tiles = [];
            for (let i=1; i<size*size; i++) tiles.push(i);
            tiles.push(0);
            emptyIndex = size*size-1;
            renderPuzzle();
        }

        // 渲染
        function renderPuzzle() {
            puzzleEl.innerHTML = '';
            puzzleEl.style.gridTemplateColumns = `repeat(${size}, 80px)`;
            tiles.forEach((num, idx) => {
                const t = document.createElement('div');
                t.className = `tile ${num===0 ? 'empty' : ''}`;
                t.textContent = num || '';
                if (num !== 0) {
                    t.addEventListener('click', () => moveTile(idx));
                }
                puzzleEl.appendChild(t);
            });
        }

        // 移动
        function moveTile(index) {
            if (!isPlaying) return;
            const r = Math.floor(index/size), c = index%size;
            const er = Math.floor(emptyIndex/size), ec = emptyIndex%size;
            const adj = (r===er && Math.abs(c-ec)===1) || (c===ec && Math.abs(r-er)===1);
            if (adj) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                emptyIndex = index;
                steps++;
                stepsEl.textContent = steps;
                renderPuzzle();
                checkWin();
            }
        }

        // 胜利判定
        function checkWin() {
            const win = tiles.every((v,i)=>v===target[i]);
            if (win) {
                isPlaying = false;
                clearInterval(timer);
                winEl.style.display = 'block';
                setTimeout(showNameInput, 500);
            }
        }

        // 打乱（有解）
        function shufflePuzzle() {
            do {
                for (let i=tiles.length-2; i>0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
                }
                updateEmpty();
            } while (!isSolvable() || isDone());
            renderPuzzle();
        }

        function updateEmpty() { emptyIndex = tiles.indexOf(0); }
        function isDone() { return tiles.every((v,i)=>v===target[i]); }

        // 有解判定
        function isSolvable() {
            let inv = 0;
            const f = tiles.filter(x=>x!==0);
            for (let i=0; i<f.length; i++) for (let j=i+1; j<f.length; j++) if (f[i]>f[j]) inv++;
            const er = size - Math.floor(emptyIndex/size);
            return size%2===1 ? inv%2===0 : (inv+er)%2===1;
        }

        // 开始
        document.getElementById('shuffle').addEventListener('click', () => {
            if (!isPlaying) {
                isPlaying = true;
                time = steps = 0;
                timeEl.textContent = time;
                stepsEl.textContent = steps;
                winEl.style.display = 'none';
                clearInterval(timer);
                timer = setInterval(()=>{ time++; timeEl.textContent=time; },1000);
            }
            shufflePuzzle();
        });

        // 重置
        document.getElementById('reset').addEventListener('click', resetGame);
        function resetGame() {
            isPlaying = false;
            steps = time = 0;
            clearInterval(timer);
            stepsEl.textContent = steps;
            timeEl.textContent = time;
            winEl.style.display = 'none';
            initTarget(); initPuzzle();
        }

        // ==============================================
        // 排行榜功能
        // ==============================================
        const rankModal = document.getElementById('rankModal');
        const nameModal = document.getElementById('nameModal');
        const rankList = document.getElementById('rankList');
        const rankTab = document.querySelectorAll('.rank-tab button');

        // 打开排行榜
        document.getElementById('rankBtn').addEventListener('click',()=>{
            renderRank(3);
            rankModal.style.display = 'flex';
        });
        document.getElementById('closeRank').addEventListener('click',()=>{
            rankModal.style.display = 'none';
        });

        // 切换难度排行
        rankTab.forEach(b=>{
            b.addEventListener('click',()=>{
                rankTab.forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                renderRank(parseInt(b.dataset.diff));
            });
        });

        // 渲染榜单
        function renderRank(diff) {
            const key = `rank_${diff}`;
            let list = JSON.parse(localStorage.getItem(key)) || [];
            list.sort((a,b)=>a.time-b.time || a.steps-b.steps);
            rankList.innerHTML = '';
            if (list.length===0) {
                rankList.innerHTML = '<div style="padding:10px;">暂无记录</div>';
                return;
            }
            list.forEach((item,i)=>{
                const div = document.createElement('div');
                div.className = `rank-item ${i===0?'top1':''}`;
                div.innerHTML = `
                    <span>${i+1}. ${item.name}</span>
                    <span>${item.time}s / ${item.steps}步</span>
                `;
                rankList.appendChild(div);
            });
        }

        // 通关输入名字
        function showNameInput() {
            nameModal.style.display = 'flex';
        }

        // 保存记录
        document.getElementById('saveName').addEventListener('click',()=>{
            const name = document.getElementById('userName').value.trim();
            if (!name) { alert('请输入名字'); return; }
            const key = `rank_${size}`;
            let list = JSON.parse(localStorage.getItem(key)) || [];
            list.push({name, time, steps});
            localStorage.setItem(key, JSON.stringify(list));
            nameModal.style.display = 'none';
        });

        // 启动
        window.onload = ()=>{ initTarget(); initPuzzle(); }
    </script>
</body>
</html>
