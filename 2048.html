<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 小游戏 - 带滑动动画</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <div class="max-w-md w-full">
        <div class="text-center mb-6">
            <h1 class="text-5xl font-bold text-amber-800 mb-2">2048</h1>
            <p class="text-amber-700">使用方向键滑动方块，合并相同数字，挑战2048！</p>
        </div>
        
        <div class="flex justify-between items-center mb-4">
            <div class="bg-amber-700 text-white px-4 py-2 rounded-lg shadow-md">
                <div class="text-xs uppercase tracking-wide">分数</div>
                <div id="score" class="text-2xl font-bold">0</div>
            </div>
            <button id="new-game" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-all duration-200 transform hover:scale-105 active:scale-95">
                新游戏
            </button>
        </div>
        
        <div id="game-container" class="relative bg-amber-800 rounded-xl p-3 shadow-xl">
            <!-- 背景网格 -->
            <div id="grid-background" class="grid grid-cols-4 gap-3">
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
                <div class="aspect-square rounded-lg bg-amber-700/30"></div>
            </div>
            
            <!-- 方块容器 -->
            <div id="tiles-container" class="absolute inset-3"></div>
            
            <!-- 游戏结束界面 - 添加了z-index: 1000确保置顶 -->
            <div id="game-over" class="hidden absolute inset-0 bg-black/70 rounded-xl flex flex-col items-center justify-center text-white" style="z-index: 1000;">
                <h2 class="text-3xl font-bold mb-4">游戏结束!</h2>
                <p class="mb-6">最终分数: <span id="final-score">0</span></p>
                <button id="try-again" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all duration-200 transform hover:scale-105 active:scale-95">
                    再玩一次
                </button>
            </div>
            
            <!-- 胜利界面 - 添加了z-index: 1000确保置顶 -->
            <div id="you-win" class="hidden absolute inset-0 bg-amber-500/90 rounded-xl flex flex-col items-center justify-center text-white" style="z-index: 1000;">
                <h2 class="text-3xl font-bold mb-4">恭喜你赢了!</h2>
                <p class="mb-6">你达到了2048!</p>
                <div class="flex gap-3">
                    <button id="continue-game" class="bg-amber-700 hover:bg-amber-800 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-all duration-200">
                        继续游戏
                    </button>
                    <button id="new-game-win" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-all duration-200">
                        新游戏
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-6 text-center text-amber-700 text-sm">
            <p>电脑: 使用 ↑ ↓ ← → 方向键控制</p>
            <p>手机: 在屏幕上滑动控制</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tilesContainer = document.getElementById('tiles-container');
            const scoreDisplay = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const youWinScreen = document.getElementById('you-win');
            const finalScoreDisplay = document.getElementById('final-score');
            const newGameButton = document.getElementById('new-game');
            const tryAgainButton = document.getElementById('try-again');
            const continueButton = document.getElementById('continue-game');
            const newGameWinButton = document.getElementById('new-game-win');
            
            let board = [];
            let score = 0;
            let gameOver = false;
            let won = false;
            let tileIdCounter = 0;
            let tiles = {};
            
            // 不同数字对应的背景色
            const tileColors = {
                2: '#eee4da',
                4: '#ede0c8',
                8: '#f2b179',
                16: '#f59563',
                32: '#f67c5f',
                64: '#f65e3b',
                128: '#edcf72',
                256: '#edcc61',
                512: '#edc850',
                1024: '#edc53f',
                2048: '#edc22e',
                4096: '#3c3a32',
                8192: '#3c3a32'
            };
            
            // 计算格子大小和间距
            function getGridDimensions() {
                const containerWidth = tilesContainer.clientWidth;
                const gap = 12; // 与CSS中的gap一致
                const cellSize = (containerWidth - 3 * gap) / 4;
                return { cellSize, gap };
            }
            
            // 创建一个新方块
            function createTile(row, col, value) {
                const { cellSize, gap } = getGridDimensions();
                const id = tileIdCounter++;
                
                const tile = document.createElement('div');
                tile.id = `tile-${id}`;
                tile.className = 'absolute rounded-lg flex items-center justify-center font-bold transition-all duration-150 ease-in-out';
                tile.style.width = `${cellSize}px`;
                tile.style.height = `${cellSize}px`;
                tile.style.left = `${col * (cellSize + gap)}px`;
                tile.style.top = `${row * (cellSize + gap)}px`;
                tile.style.backgroundColor = tileColors[value] || '#3c3a32';
                tile.style.color = value <= 4 ? '#776e65' : '#f9f6f2';
                tile.style.fontSize = value >= 1000 ? '1.25rem' : '1.5rem';
                tile.textContent = value;
                tile.style.transform = 'scale(0)';
                tile.style.zIndex = '10';
                
                tilesContainer.appendChild(tile);
                
                // 出现动画
                setTimeout(() => {
                    tile.style.transform = 'scale(1)';
                }, 10);
                
                tiles[id] = {
                    element: tile,
                    row,
                    col,
                    value
                };
                
                return id;
            }
            
            // 移动方块到指定位置
            function moveTile(tileId, newRow, newCol) {
                const { cellSize, gap } = getGridDimensions();
                const tile = tiles[tileId];
                
                tile.row = newRow;
                tile.col = newCol;
                tile.element.style.left = `${newCol * (cellSize + gap)}px`;
                tile.element.style.top = `${newRow * (cellSize + gap)}px`;
            }
            
            // 合并两个方块
            function mergeTiles(fromTileId, toTileId) {
                const fromTile = tiles[fromTileId];
                const toTile = tiles[toTileId];
                
                // 移动fromTile到toTile的位置
                moveTile(fromTileId, toTile.row, toTile.col);
                
                // 动画结束后合并
                setTimeout(() => {
                    // 更新toTile的值
                    toTile.value *= 2;
                    toTile.element.textContent = toTile.value;
                    toTile.element.style.backgroundColor = tileColors[toTile.value] || '#3c3a32';
                    toTile.element.style.color = toTile.value <= 4 ? '#776e65' : '#f9f6f2';
                    toTile.element.style.fontSize = toTile.value >= 1000 ? '1.25rem' : '1.5rem';
                    
                    // 合并动画
                    toTile.element.style.transform = 'scale(1.2)';
                    setTimeout(() => {
                        toTile.element.style.transform = 'scale(1)';
                    }, 100);
                    
                    // 删除fromTile
                    fromTile.element.remove();
                    delete tiles[fromTileId];
                }, 150);
            }
            
            // 清除所有方块
            function clearAllTiles() {
                tilesContainer.innerHTML = '';
                tiles = {};
                tileIdCounter = 0;
            }
            
            // 初始化游戏
            function initGame() {
                board = Array(4).fill().map(() => Array(4).fill(null));
                score = 0;
                gameOver = false;
                won = false;
                scoreDisplay.textContent = score;
                gameOverScreen.classList.add('hidden');
                youWinScreen.classList.add('hidden');
                
                clearAllTiles();
                
                // 生成两个初始数字
                generateRandomTile();
                generateRandomTile();
            }
            
            // 生成随机数字块
            function generateRandomTile() {
                // 找到所有空位置
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (board[i][j] === null) {
                            emptyCells.push({row: i, col: j});
                        }
                    }
                }
                
                if (emptyCells.length === 0) return false;
                
                // 随机选择一个空位置
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                // 90%概率生成2，10%概率生成4
                const value = Math.random() < 0.9 ? 2 : 4;
                const tileId = createTile(randomCell.row, randomCell.col, value);
                board[randomCell.row][randomCell.col] = tileId;
                return true;
            }
            
            // 检查游戏是否结束
            function checkGameOver() {
                // 检查是否还有空单元格
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (board[i][j] === null) return false;
                    }
                }
                
                // 检查是否还有可以合并的相邻单元格
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const current = board[i][j] ? tiles[board[i][j]].value : 0;
                        // 检查右边
                        if (j < 3 && board[i][j+1] && tiles[board[i][j+1]].value === current) return false;
                        // 检查下边
                        if (i < 3 && board[i+1][j] && tiles[board[i+1][j]].value === current) return false;
                    }
                }
                
                return true;
            }
            
            // 检查是否获胜
            function checkWin() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (board[i][j] && tiles[board[i][j]].value === 2048 && !won) {
                            won = true;
                            youWinScreen.classList.remove('hidden');
                            return true;
                        }
                    }
                }
                return false;
            }
            
            // 向左移动
            function moveLeft() {
                let moved = false;
                const merges = [];
                
                for (let i = 0; i < 4; i++) {
                    let currentCol = 0;
                    let lastValue = null;
                    let lastTileId = null;
                    
                    for (let j = 0; j < 4; j++) {
                        if (board[i][j] !== null) {
                            const tileId = board[i][j];
                            const value = tiles[tileId].value;
                            
                            if (lastValue === value) {
                                // 可以合并
                                merges.push({from: tileId, to: lastTileId});
                                board[i][j] = null;
                                lastValue = null;
                                lastTileId = null;
                                moved = true;
                            } else {
                                // 移动到currentCol位置
                                if (j !== currentCol) {
                                    moveTile(tileId, i, currentCol);
                                    board[i][j] = null;
                                    board[i][currentCol] = tileId;
                                    moved = true;
                                }
                                lastValue = value;
                                lastTileId = tileId;
                                currentCol++;
                            }
                        }
                    }
                }
                
                // 执行合并
                setTimeout(() => {
                    merges.forEach(merge => {
                        score += tiles[merge.to].value * 2;
                        scoreDisplay.textContent = score;
                        mergeTiles(merge.from, merge.to);
                    });
                    
                    // 生成新方块
                    setTimeout(() => {
                        if (moved) {
                            generateRandomTile();
                            
                            if (checkWin()) {
                                // 玩家获胜，但可以继续游戏
                            }
                            
                            if (checkGameOver()) {
                                gameOver = true;
                                finalScoreDisplay.textContent = score;
                                gameOverScreen.classList.remove('hidden');
                            }
                        }
                    }, 150);
                }, 150);
                
                return moved;
            }
            
            // 向右移动
            function moveRight() {
                let moved = false;
                const merges = [];
                
                for (let i = 0; i < 4; i++) {
                    let currentCol = 3;
                    let lastValue = null;
                    let lastTileId = null;
                    
                    for (let j = 3; j >= 0; j--) {
                        if (board[i][j] !== null) {
                            const tileId = board[i][j];
                            const value = tiles[tileId].value;
                            
                            if (lastValue === value) {
                                // 可以合并
                                merges.push({from: tileId, to: lastTileId});
                                board[i][j] = null;
                                lastValue = null;
                                lastTileId = null;
                                moved = true;
                            } else {
                                // 移动到currentCol位置
                                if (j !== currentCol) {
                                    moveTile(tileId, i, currentCol);
                                    board[i][j] = null;
                                    board[i][currentCol] = tileId;
                                    moved = true;
                                }
                                lastValue = value;
                                lastTileId = tileId;
                                currentCol--;
                            }
                        }
                    }
                }
                
                // 执行合并
                setTimeout(() => {
                    merges.forEach(merge => {
                        score += tiles[merge.to].value * 2;
                        scoreDisplay.textContent = score;
                        mergeTiles(merge.from, merge.to);
                    });
                    
                    // 生成新方块
                    setTimeout(() => {
                        if (moved) {
                            generateRandomTile();
                            
                            if (checkWin()) {
                                // 玩家获胜，但可以继续游戏
                            }
                            
                            if (checkGameOver()) {
                                gameOver = true;
                                finalScoreDisplay.textContent = score;
                                gameOverScreen.classList.remove('hidden');
                            }
                        }
                    }, 150);
                }, 150);
                
                return moved;
            }
            
            // 向上移动
            function moveUp() {
                let moved = false;
                const merges = [];
                
                for (let j = 0; j < 4; j++) {
                    let currentRow = 0;
                    let lastValue = null;
                    let lastTileId = null;
                    
                    for (let i = 0; i < 4; i++) {
                        if (board[i][j] !== null) {
                            const tileId = board[i][j];
                            const value = tiles[tileId].value;
                            
                            if (lastValue === value) {
                                // 可以合并
                                merges.push({from: tileId, to: lastTileId});
                                board[i][j] = null;
                                lastValue = null;
                                lastTileId = null;
                                moved = true;
                            } else {
                                // 移动到currentRow位置
                                if (i !== currentRow) {
                                    moveTile(tileId, currentRow, j);
                                    board[i][j] = null;
                                    board[currentRow][j] = tileId;
                                    moved = true;
                                }
                                lastValue = value;
                                lastTileId = tileId;
                                currentRow++;
                            }
                        }
                    }
                }
                
                // 执行合并
                setTimeout(() => {
                    merges.forEach(merge => {
                        score += tiles[merge.to].value * 2;
                        scoreDisplay.textContent = score;
                        mergeTiles(merge.from, merge.to);
                    });
                    
                    // 生成新方块
                    setTimeout(() => {
                        if (moved) {
                            generateRandomTile();
                            
                            if (checkWin()) {
                                // 玩家获胜，但可以继续游戏
                            }
                            
                            if (checkGameOver()) {
                                gameOver = true;
                                finalScoreDisplay.textContent = score;
                                gameOverScreen.classList.remove('hidden');
                            }
                        }
                    }, 150);
                }, 150);
                
                return moved;
            }
            
            // 向下移动
            function moveDown() {
                let moved = false;
                const merges = [];
                
                for (let j = 0; j < 4; j++) {
                    let currentRow = 3;
                    let lastValue = null;
                    let lastTileId = null;
                    
                    for (let i = 3; i >= 0; i--) {
                        if (board[i][j] !== null) {
                            const tileId = board[i][j];
                            const value = tiles[tileId].value;
                            
                            if (lastValue === value) {
                                // 可以合并
                                merges.push({from: tileId, to: lastTileId});
                                board[i][j] = null;
                                lastValue = null;
                                lastTileId = null;
                                moved = true;
                            } else {
                                // 移动到currentRow位置
                                if (i !== currentRow) {
                                    moveTile(tileId, currentRow, j);
                                    board[i][j] = null;
                                    board[currentRow][j] = tileId;
                                    moved = true;
                                }
                                lastValue = value;
                                lastTileId = tileId;
                                currentRow--;
                            }
                        }
                    }
                }
                
                // 执行合并
                setTimeout(() => {
                    merges.forEach(merge => {
                        score += tiles[merge.to].value * 2;
                        scoreDisplay.textContent = score;
                        mergeTiles(merge.from, merge.to);
                    });
                    
                    // 生成新方块
                    setTimeout(() => {
                        if (moved) {
                            generateRandomTile();
                            
                            if (checkWin()) {
                                // 玩家获胜，但可以继续游戏
                            }
                            
                            if (checkGameOver()) {
                                gameOver = true;
                                finalScoreDisplay.textContent = score;
                                gameOverScreen.classList.remove('hidden');
                            }
                        }
                    }, 150);
                }, 150);
                
                return moved;
            }
            
            // 处理移动
            function handleMove(direction) {
                if (gameOver) return;
                
                let moved = false;
                
                switch(direction) {
                    case 'left':
                        moved = moveLeft();
                        break;
                    case 'right':
                        moved = moveRight();
                        break;
                    case 'up':
                        moved = moveUp();
                        break;
                    case 'down':
                        moved = moveDown();
                        break;
                }
            }
            
            // 键盘事件监听
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        handleMove('left');
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        handleMove('right');
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        handleMove('up');
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        handleMove('down');
                        break;
                }
            });
            
            // 触摸事件支持
            let touchStartX = 0;
            let touchStartY = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, {passive: true});
            
            document.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                // 判断滑动方向
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 水平滑动
                    if (Math.abs(diffX) > 30) {
                        if (diffX > 0) {
                            handleMove('right');
                        } else {
                            handleMove('left');
                        }
                    }
                } else {
                    // 垂直滑动
                    if (Math.abs(diffY) > 30) {
                        if (diffY > 0) {
                            handleMove('down');
                        } else {
                            handleMove('up');
                        }
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            }, {passive: true});
            
            // 窗口大小改变时重新计算方块位置
            window.addEventListener('resize', () => {
                const { cellSize, gap } = getGridDimensions();
                Object.values(tiles).forEach(tile => {
                    tile.element.style.width = `${cellSize}px`;
                    tile.element.style.height = `${cellSize}px`;
                    tile.element.style.left = `${tile.col * (cellSize + gap)}px`;
                    tile.element.style.top = `${tile.row * (cellSize + gap)}px`;
                });
            });
            
            // 按钮事件
            newGameButton.addEventListener('click', initGame);
            tryAgainButton.addEventListener('click', initGame);
            newGameWinButton.addEventListener('click', initGame);
            continueButton.addEventListener('click', () => {
                youWinScreen.classList.add('hidden');
            });
            
            // 开始游戏
            initGame();
        });
    </script>
</body>
</html>
