<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球游戏（地图+速度双选择）</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #111;
            flex-direction: column;
            color: white;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #game {
            border: 2px solid #fff;
            background: #000;
        }
        #score {
            margin-bottom: 10px;
            font-size: 20px;
        }
        .control-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        #startBtn, #mapSelect, #speedSelect {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #333;
            color: white;
        }
        #mapSelect, #speedSelect {
            width: 150px;
        }
        #startBtn:hover, #mapSelect:hover, #speedSelect:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div id="score">分数: 0</div>
    <div class="control-panel">
        <select id="mapSelect">
            <option value="easy">简单地图</option>
            <option value="normal">普通地图</option>
            <option value="hard">困难地图</option>
            <option value="extreme">极限地图</option>
        </select>
        <!-- 速度选择 -->
        <select id="speedSelect">
            <option value="slow">慢速</option>
            <option value="normal" selected>标准</option>
            <option value="fast">快速</option>
            <option value="extreme">极速</option>
        </select>
        <button id="startBtn">开始游戏</button>
    </div>
    <canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startBtn = document.getElementById('startBtn');
const mapSelect = document.getElementById('mapSelect');
const speedSelect = document.getElementById('speedSelect');

let score = 0;
let gameStarted = false;
let isDragging = false;

// 速度配置：独立控制全局倍率
const speedConfigs = {
    slow: 0.7,
    normal: 1.0,
    fast: 1.3,
    extreme: 1.6
};

// 球
let ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    baseDx: 1.6,
    baseDy: 2.0,
    dx: 1.6,
    dy: 2.0
};

// 挡板
let paddle = {
    width: 80,
    height: 12,
    x: canvas.width / 2 - 40,
    y: canvas.height - 30,
    baseSpeed: 7,
    speed: 7
};

// 地图配置
const mapConfigs = {
    easy: {
        brickRow: 3, brickCol: 6, brickW: 60, brickH: 20, brickGap: 5,
        ballSpeedMultiplier: 0.8, paddleSpeedMultiplier: 1.2, speedIncrease: 0.0001
    },
    normal: {
        brickRow: 5, brickCol: 8, brickW: 45, brickH: 20, brickGap: 5,
        ballSpeedMultiplier: 1.0, paddleSpeedMultiplier: 1.0, speedIncrease: 0.00018
    },
    hard: {
        brickRow: 7, brickCol: 9, brickW: 40, brickH: 15, brickGap: 3,
        ballSpeedMultiplier: 1.2, paddleSpeedMultiplier: 0.9, speedIncrease: 0.00025
    },
    extreme: {
        brickRow: 8, brickCol: 10, brickW: 35, brickH: 12, brickGap: 2,
        ballSpeedMultiplier: 1.4, paddleSpeedMultiplier: 0.8, speedIncrease: 0.00035
    }
};

let currentMap = mapConfigs.normal;
let currentSpeed = speedConfigs.normal;
let bricks = [];
let right = false, left = false;
let speedMultiplier = 1;

// 初始化配置（地图+速度）
function initGameConfig(mapKey, speedKey) {
    currentMap = mapConfigs[mapKey];
    currentSpeed = speedConfigs[speedKey];
    
    // 球速 = 基础速度 × 地图倍率 × 速度选择倍率
    ball.dx = ball.baseDx * currentMap.ballSpeedMultiplier * currentSpeed;
    ball.dy = ball.baseDy * currentMap.ballSpeedMultiplier * currentSpeed;
    
    // 挡板速度同步适配
    paddle.speed = paddle.baseSpeed * currentMap.paddleSpeedMultiplier * currentSpeed;
    speedMultiplier = 1;
}

// 初始化砖块
function initBricks() {
    bricks = [];
    const { brickRow, brickCol, brickW, brickH, brickGap } = currentMap;
    for (let r = 0; r < brickRow; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickCol; c++) {
            const x = c * (brickW + brickGap) + (canvas.width - (brickCol * (brickW + brickGap) - brickGap)) / 2;
            const y = r * (brickH + brickGap) + 40;
            bricks[r][c] = { x, y, alive: true };
        }
    }
}

// 键盘控制
document.addEventListener('keydown', e => {
    if (!gameStarted) return;
    if (e.key === 'ArrowRight') right = true;
    if (e.key === 'ArrowLeft') left = true;
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowRight') right = false;
    if (e.key === 'ArrowLeft') left = false;
});

// 鼠标拖动
canvas.addEventListener('mousedown', e => {
    if (!gameStarted) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (mx >= paddle.x && mx <= paddle.x + paddle.width && my >= paddle.y && my <= paddle.y + paddle.height) {
        isDragging = true;
    }
});
document.addEventListener('mousemove', e => {
    if (!gameStarted || !isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    paddle.x = mx - paddle.width / 2;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
});
document.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

// 触屏控制
canvas.addEventListener('touchmove', e => {
    if (!gameStarted) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    paddle.x = x - paddle.width / 2;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
    e.preventDefault();
});

// 绘制
function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.closePath();
}
function drawPaddle() {
    ctx.fillStyle = '#0ff';
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}
function drawBricks() {
    const { brickRow, brickCol, brickW, brickH } = currentMap;
    for (let r = 0; r < brickRow; r++) {
        for (let c = 0; c < brickCol; c++) {
            const b = bricks[r][c];
            if (b.alive) {
                const colors = ['#f60','#0f6','#60f','#ff0','#f0f','#0ff','#66f','#f66'];
                ctx.fillStyle = colors[r % colors.length];
                ctx.fillRect(b.x, b.y, brickW, brickH);
            }
        }
    }
}

// 移动与碰撞
function move() {
    if (!gameStarted) return;
    speedMultiplier += currentMap.speedIncrease;
    speedMultiplier = Math.min(speedMultiplier, 2.5);

    if (!isDragging) {
        if (right) paddle.x += paddle.speed;
        if (left) paddle.x -= paddle.speed;
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
    }

    ball.x += ball.dx * speedMultiplier;
    ball.y += ball.dy * speedMultiplier;

    // 墙壁碰撞
    if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.dx = -ball.dx; }
    if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.dx = -ball.dx; }
    if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.dy = -ball.dy; }

    // 游戏结束
    if (ball.y + ball.radius > canvas.height) {
        alert(`游戏结束！得分：${score}\n地图：${mapSelect.options[mapSelect.selectedIndex].text}\n速度：${speedSelect.options[speedSelect.selectedIndex].text}`);
        restart();
        return;
    }

    // 挡板碰撞
    if (ball.y + ball.radius > paddle.y && ball.x > paddle.x - ball.radius && ball.x < paddle.x + paddle.width + ball.radius) {
        ball.dy = -Math.abs(ball.dy);
        const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        ball.dx = hitPos * (ball.baseDx * 1.5) * currentMap.ballSpeedMultiplier * currentSpeed;
    }

    // 砖块碰撞
    let allDead = true;
    const { brickRow, brickCol, brickW, brickH } = currentMap;
    for (let r = 0; r < brickRow; r++) {
        for (let c = 0; c < brickCol; c++) {
            const b = bricks[r][c];
            if (b.alive) {
                allDead = false;
                if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + brickW && ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + brickH) {
                    ball.dy = -ball.dy;
                    b.alive = false;
                    score += 10;
                    scoreEl.innerText = `分数: ${score}`;
                    speedMultiplier = Math.min(speedMultiplier + 0.02, 2.5);
                }
            }
        }
    }

    if (allDead) {
        alert(`恭喜通关！得分：${score}\n地图：${mapSelect.options[mapSelect.selectedIndex].text}\n速度：${speedSelect.options[speedSelect.selectedIndex].text}`);
        restart();
    }
}

// 游戏循环
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBall();
    drawPaddle();
    drawBricks();
    move();
    requestAnimationFrame(loop);
}

// 重启
function restart() {
    gameStarted = false;
    isDragging = false;
    startBtn.style.display = 'block';
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    initGameConfig(mapSelect.value, speedSelect.value);
    score = 0;
    scoreEl.innerText = `分数: ${score}`;
    initBricks();
}

// 选择切换实时生效
mapSelect.addEventListener('change', () => {
    if (!gameStarted) {
        initGameConfig(mapSelect.value, speedSelect.value);
        initBricks();
    }
});
speedSelect.addEventListener('change', () => {
    if (!gameStarted) {
        initGameConfig(mapSelect.value, speedSelect.value);
        initBricks();
    }
});

// 开始游戏
startBtn.addEventListener('click', () => {
    gameStarted = true;
    startBtn.style.display = 'none';
    initGameConfig(mapSelect.value, speedSelect.value);
});

// 初始化
initGameConfig('normal', 'normal');
initBricks();
loop();
</script>
</body>
</html>
